spring.application.name=sgp-api

# Propriedades de conexão com o banco de dados
# https://spring.io/guides/gs/accessing-data-mysql

#MOSTRA AS INSTRUÇÕES NO LOG, FORMATADO EM UMA UNICA LINHA, IDENTADO COLOCAR TRUE
spring.jpa.properties.hibernate.format_sql=false


logging.level.=error
spring.output.ansi.enabled= always
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true
# spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/sgp_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_paulo
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/sgp_db
spring.datasource.username=root
spring.datasource.password=root



